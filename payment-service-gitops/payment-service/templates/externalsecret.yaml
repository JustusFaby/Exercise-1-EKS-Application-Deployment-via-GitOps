apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "payment-service.fullname" . }}-es
  labels:
    {{- include "payment-service.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "payment-service.fullname" . }}-aws-store
    kind: SecretStore
  target:
    name: payment-service-secret-k8s
    creationPolicy: Owner
  data:
    - secretKey: api_key
      remoteRef:
        key: payment-service-secret
        property: api_key
