apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ include "payment-service.fullname" . }}-aws-store
  labels:
    {{- include "payment-service.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "payment-service.serviceAccountName" . }}
